services:
  web:
    build: ./backend
    env_file:
      - .env
    command: >
      sh -c "
      until python /code/manage.py migrate --noinput; do
        echo 'Waiting for database...';
        sleep 2;
      done &&
      python /code/manage.py seed_initial_data &&
      python /code/manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/code
    ports:
      - 8000:8000
    depends_on:
      - db
  frontend:
    build: ./frontend
    working_dir: /app
    command: npm run dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - 3000:3000
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/auth
    depends_on:
      - web
  db:
    image: postgres:14
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
volumes:
  postgres_data:
  frontend_node_modules:
